.reset-flash{
  position:fixed;
  inset:0;
  z-index:998;
  display:grid;
  place-items:center;
  pointer-events:none;
  background:rgba(7,6,4,.58);
  color:var(--paper);
  opacity:0;
}
.reset-flash.active{
  animation:resetFlash .7s ease both;
}
.reset-flash span{
  padding:.75rem 1rem;
  border:1px solid rgba(245,234,210,.24);
  border-radius:999px;
  background:rgba(16,14,11,.72);
  font-weight:900;
}
@keyframes resetFlash{
  0%{opacity:0}
  18%{opacity:1}
  78%{opacity:1}
  100%{opacity:0}
}


/* 선택 판결 도장 */
.verdict-stamp{
  width:max-content;
  max-width:100%;
  margin:.9rem 0 0 auto;
  padding:.38rem .7rem .42rem;
  border:3px double rgba(141,47,39,.82);
  border-radius:.35rem;
  color:var(--red);
  background:rgba(255,255,255,.28);
  font-family:"Noto Serif KR",serif;
  font-weight:900;
  letter-spacing:-.04em;
  transform:rotate(-5deg) scale(.92);
  opacity:0;
  transform-origin:center;
  box-shadow:0 6px 14px rgba(141,47,39,.12);
}
.verdict-stamp span{
  display:block;
  font-size:1.12rem;
  line-height:1;
}
.verdict-stamp small{
  display:block;
  margin-top:.18rem;
  font-family:"Noto Sans KR",sans-serif;
  font-size:.74rem;
  letter-spacing:-.03em;
  white-space:normal;
}
.feedback.visible .verdict-stamp{
  animation:stampHit .42s cubic-bezier(.2,1.35,.3,1) both;
}
@keyframes stampHit{
  0%{opacity:0;transform:rotate(-12deg) scale(1.45);filter:blur(2px)}
  55%{opacity:1;transform:rotate(-5deg) scale(.88);filter:blur(0)}
  72%{transform:rotate(-5deg) scale(1.04)}
  100%{opacity:1;transform:rotate(-5deg) scale(1)}
}

/* 페이지 연결 오버레이 */
.route-bridge{
  position:fixed;
  left:50%;
  top:50%;
  z-index:997;
  transform:translate(-50%,-50%);
  width:min(92vw,640px);
  padding:1rem 1.2rem;
  border:1px solid rgba(245,234,210,.22);
  border-radius:1.35rem;
  background:rgba(16,14,11,.76);
  color:var(--paper);
  text-align:center;
  backdrop-filter:blur(14px);
  box-shadow:0 26px 80px rgba(0,0,0,.38);
  opacity:0;
  pointer-events:none;
}
.route-bridge.active{
  animation:bridgePass 1.65s ease both;
}
.route-bridge span{
  display:inline-flex;
  margin-bottom:.35rem;
  padding:.22rem .58rem;
  border-radius:999px;
  background:rgba(201,154,58,.14);
  border:1px solid rgba(201,154,58,.3);
  color:var(--paper2);
  font-size:.82rem;
  font-weight:900;
}
.route-bridge strong{
  display:block;
  font-family:"Noto Serif KR",serif;
  font-size:clamp(1.35rem,4vw,2.5rem);
  line-height:1.15;
  letter-spacing:-.06em;
  word-break:keep-all;
}
@keyframes bridgePass{
  0%{opacity:0;transform:translate(-50%,-46%) scale(.98)}
  14%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  78%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-53%) scale(.99)}
}
.slide.active .wrap{
  animation:pageSettle .32s ease both;
}
@keyframes pageSettle{
  from{opacity:.72;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

<div class="timewarp" id="timewarp"><div class="rings"></div><div class="tunnel"></div><div class="years"><span>2026</span><span>1904</span><span>1899</span><span>1898</span><span>1897</span><span>1896</span></div><div class="wmsg"><strong>시간을 거슬러 갑니다</strong><p>조선 말기와 대한제국의 선택 속으로</p></div></div>
<header class="topbar"><nav class="nav"><a class="brand" href="#" onclick="goTo(0);return false">역사는 흑백이 아니다</a><div class="status"><span class="pill" id="slideStatus">1 / 1</span><span class="pill" id="lensStatus">학급 관점: 아직 형성 중</span><span class="pill" id="choiceCount">선택 기록 0개</span></div><div class="nav-actions"><button class="small" onclick="prevSlide()">← 이전</button><button class="small" onclick="nextSlide()">다음 →</button><button class="small" onclick="resetPresentation()">초기화</button></div></nav></header>

<script>
const app=document.getElementById('app');let current=0;let state={answers:{},labels:{},scores:{citizen:0,emperor:0,realism:0,complexity:0},increments:{}};
const F={why:{test:['시험도 출발점이 될 수 있습니다.','하지만 오늘 발표에서는 암기를 넘어 현재의 판단력을 기르는 방향으로 확장해봅니다.'],facts:['사실 확인은 역사 공부의 기본입니다.','다만 사실을 나열하는 것만으로는 부족합니다. 그 사실이 왜 일어났고 어떤 결과를 낳았는지 따져봐야 합니다.'],present:['좋은 출발입니다.','과거의 판단을 살피는 이유는 오늘 우리가 비슷한 문제를 더 신중하게 보기 위해서입니다.'],repeat:['역사의 교훈에 가까운 답입니다.','무엇이 왜 실패했는지 따져봐야 실수를 반복하지 않을 수 있습니다.']},'empire-origin':{independence:['자주국 선포를 강조한 선택입니다.','대한제국 수립은 국제 질서 속에서 조선이 황제국이자 자주국임을 내세운 사건이었습니다.'],dependence:['외세 의존을 강조한 선택입니다.','아관파천은 국가의 자주성을 손상시켰고 열강의 이권 침탈을 심화시켰습니다.'],both:['핵심 주제와 잘 맞는 선택입니다.','자주 독립의 선언이면서 동시에 외세 의존의 불안정성을 안고 있었습니다.'],unclear:['판단을 보류한 선택입니다.','아관파천과 대한제국 수립은 배경과 결과를 함께 봐야 합니다.']},lead:{citizen:['민권 중심 관점이 강합니다.','이 관점으로 보면 만민공동회와 헌의 6조가 특히 중요해집니다.'],emperor:['국가 주도 관점이 강합니다.','이 관점으로 보면 광무개혁의 토지·산업·군사 개혁이 중요해집니다.'],balance:['현실 외교 관점이 강합니다.','열강 사이에서 어떤 선택이 가능했는지 따져보게 됩니다.'],industry:['실력 양성 관점입니다.','군사력, 산업, 교육, 도시 인프라가 중요해집니다.']},independence:{yes:['민권 운동의 의미를 강조한 선택입니다.','독립협회는 근대적 정치 참여의 가능성을 보여주었습니다.'],no:['한계를 강조한 선택입니다.','독립협회는 민중을 완전한 주체로 보지 못한 면이 있었습니다.'],partial:['가장 복합적인 판단입니다.','가능성과 한계를 함께 가진 불완전한 개혁 세력이었습니다.'],hold:['판단을 보류하는 것도 역사적 태도입니다.','관점이 충돌할 때 성급히 결론을 내리지 않는 것이 좋습니다.']},'people-tool':{subject:['민중 참여의 의미를 강조한 선택입니다.','만민공동회의 열기와 광장 정치는 실제였습니다.'],tool:['비판적 관점을 강조한 선택입니다.','국민이라는 말이 정치적 정당성을 얻기 위한 언어로 사용된 면이 있습니다.'],both:['발표 주제와 잘 맞는 선택입니다.','국민과 함께했지만 완전히 동등한 정치 주체로 보지는 못했습니다.'],open:['좋은 역사적 태도입니다.','실제 참여와 지도부의 협상 구조를 함께 봐야 판단할 수 있습니다.']},jungchuwon:{assembly:['가능성을 강조한 선택입니다.','중추원 개편은 의회 정치의 가능성을 보여주었습니다.'],control:['한계를 강조한 선택입니다.','구성과 관제 재개정 과정은 황제권과 보수 세력의 견제를 보여줍니다.'],both:['복합적 판단입니다.','의회 정치의 가능성과 황제권 중심 질서의 한계를 동시에 보여줍니다.'],unclear:['좋은 역사적 태도입니다.','관제 내용, 의관 구성, 실제 운영을 함께 봐야 합니다.']},hwangguk:{villain:['비판의 근거가 분명한 선택입니다.','황국협회는 독립협회와 만민공동회를 탄압하는 데 동원되었습니다.'],used:['맥락을 중시한 선택입니다.','보부상 조직이 정치적으로 이용된 사례로 볼 수 있습니다.'],both:['흑백 논리를 피하는 선택입니다.','폭력성과 정치적 동원을 비판하면서도 사회적 기반을 함께 봐야 합니다.'],unknown:['자료 중심 태도입니다.','잘 모르겠다는 답은 더 찾아보겠다는 출발점이 될 수 있습니다.']},foreign:{'pro-west':['근대화에 대한 기대를 강조한 선택입니다.','서구 문물과 제도가 조선을 구할 수 있다는 기대가 침략성을 흐리게 만들 수 있었습니다.'],'anti-russia':['반러 중심 사고를 강조한 선택입니다.','러시아 견제에 집중하며 일본의 위험을 약하게 본 한계가 있습니다.'],elite:['지도부의 시야 한계를 강조한 선택입니다.','개화 지식인 지도부의 경험과 이해관계가 외세 인식에 영향을 주었습니다.'],all:['가장 복합적인 선택입니다.','서구 문명 동경, 반러 정세, 지도부 한계, 급박한 정치 상황이 겹쳤습니다.']},gwangmu:{modernization:['성과를 강조한 선택입니다.','광무개혁은 근대적 제도와 기술을 도입하려 했습니다.'],power:['정치적 한계를 강조한 선택입니다.','황제권 강화의 성격은 분명했습니다.'],both:['복합적 판단입니다.','근대화 정책이면서 동시에 황제권 강화 정책이었습니다.'],failed:['결과를 중시한 선택입니다.','실패했다는 결과만으로 시도의 의미가 사라지지는 않습니다.']},petitions:{freedom:['민권의 문제를 강조한 선택입니다.','윤치호 쪽 상소는 의회 설치와 자유권 보장을 보여줍니다.'],order:['질서의 문제를 강조한 선택입니다.','이문화 쪽 상소는 전제 황권과 전통 질서의 위기감을 보여줍니다.'],worldview:['가장 복합적인 선택입니다.','근대적 정치관과 전통적 질서관의 충돌을 보여줍니다.'],power:['현실 정치의 문제를 강조한 선택입니다.','명분 뒤에는 정권과 여론을 둘러싼 권력 투쟁도 있었습니다.']},people:{past:['과거 행적도 역사적 사실입니다.','하지만 이후의 책임을 덮는 방식이 되어서는 안 됩니다.'],later:['책임을 강조한 선택입니다.','특히 이완용의 경우 이후 행적의 책임이 매우 큽니다.'],separate:['복합 평가에 가까운 선택입니다.','과거의 선택과 이후의 책임을 구분해 보아야 합니다.'],hard:['판단의 어려움을 인정한 선택입니다.','사실, 맥락, 결과, 책임을 나누어 봐야 합니다.']},final:{citizen:['민권 중심 해석입니다.','독립협회의 정치 참여 가능성을 결론의 중심에 둘 수 있습니다.'],state:['국가 주도 근대화 해석입니다.','광무개혁의 성과와 국가 생존 전략을 중심에 둘 수 있습니다.'],failure:['좌절의 조건을 강조한 해석입니다.','내부 한계와 외세 압박을 분석하는 결론으로 이어집니다.'],complex:['발표 주제와 가장 잘 맞는 해석입니다.','이 시대는 불완전한 선택들이 충돌한 시대로 볼 수 있습니다.']}};
const slides=[{html:`<section class="slide active"><div class="wrap grid"><div><div class="kicker">선택형 발표 웹사이트 · 30분 구성</div><h1>역사는<br>흑백이<br>아니다</h1><p class="lead">독립협회, 광무개혁, 황국협회, 그리고 서재필·윤치호·이완용의 행적을 통해 “역사를 왜 배우는가”라는 질문에 접근합니다.</p><div class="next"><button class="main" onclick="startTimeTravel()">발표 시작하기 →</button><button class="ghost" onclick="goTo(slides.length-1)">마지막 결론 미리보기</button></div></div><aside class="paper"><span class="tag">발표 방식</span><h3>학생들은 손을 들고, 발표자는 버튼을 누릅니다.</h3><p>각 질문에서 학생들이 가장 많이 선택한 답을 발표자가 누르면, 그 선택에 맞는 해설이 열리고 마지막 결론에 학급의 선택 흐름이 반영됩니다.</p><div class="route"><strong>핵심 목표</strong>좋은 편과 나쁜 편을 가르는 발표가 아니라, 복잡한 선택의 조건을 따져보는 발표입니다.</div></aside></div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">1단계 · 문제의식 세우기</div><h2>우리는 역사를 왜 배울까?</h2><p class="lead">첫 질문은 발표 전체의 출발점입니다. 학생들이 어떤 관점으로 역사를 보고 있는지 먼저 확인합니다.</p><div class="quote-feature"><div class="qlabel">핵심 문장</div><p class="qmain"><span>역사는</span><strong>정답을 외우기 위해서가 아니라,</strong><strong>쉽게 판단하지 않기 위해</strong><span>배운다.</span></p><p class="qsub">오늘 발표의 기준: 선악 판정이 아니라, 선택의 조건을 따져보기</p></div></div>${question('why','손들기 질문 1','여러분은 역사를 왜 배운다고 생각하나요?',[['test','시험을 위해',{realism:1},'시험을 보기 위해'],['facts','과거 사실을 알기 위해',{complexity:1},'과거의 사실을 알기 위해'],['present','현재를 판단하기 위해',{complexity:2},'현재를 더 잘 판단하기 위해'],['repeat','실수를 반복하지 않기 위해',{complexity:2,realism:1},'같은 실수를 반복하지 않기 위해']],'다음: 시대 상황 보기 →')}</div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">2단계 · 배경 이해</div><h2>혼란의 시대: 외세, 황제, 민중</h2><p class="lead">독립협회와 광무개혁은 서로 따로 나온 사건이 아닙니다. 둘 다 위기 속에서 나라를 바꾸려는 시도였습니다.</p><div class="dark" id="whyReflection">첫 질문의 선택이 여기에 반영됩니다.</div></div><div class="paper"><div class="timeline">${time('1894','갑오개혁','근대 제도 개혁이 시도되었지만 일본 영향력의 한계도 있었습니다.')}${time('1895','을미사변','명성황후 시해 이후 조선 사회의 위기감이 커졌습니다.')}${time('1896','아관파천·독립협회 창립','외세 의존과 자주독립 요구가 동시에 나타났습니다.')}${time('1897','대한제국 수립','고종은 황제로 즉위하며 황제 중심 국가 체제를 세웠습니다.')}${time('1898','만민공동회·헌의 6조','민중과 관료가 정치 개혁을 논의했습니다.')}${time('1898','황국협회와 충돌·독립협회 해산','민중 기반 세력끼리도 다른 정치 방향을 가질 수 있음을 보여줍니다.')}${time('1899','대한국 국제','대한제국의 황제권이 강하게 규정되었습니다.')}${time('1904','러일전쟁','외세 압박이 커지며 개혁의 지속 가능성이 약해졌습니다.')}</div><div class="next"><button class="main" onclick="nextSlide()">다음: 대한제국의 출발 →</button></div></div></div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">3단계 · 아관파천에서 대한제국으로</div><h2>독립을 말했지만, 출발은 의존이었다</h2><p class="lead">아관파천은 고종의 안전을 확보했지만 국가의 자주성을 손상시켰고, 열강의 이권 침탈이 심해지는 배경이 되었습니다. 이 모순 속에서 독립협회와 대한제국이 함께 등장합니다.</p><div class="paper">${term('아관파천','1896년 고종이 러시아 공사관으로 피신한 사건. 외세 의존이라는 한계도 남겼습니다.')}${term('환궁','1897년 고종은 경운궁으로 돌아와 새로운 국가 체제 구상을 본격화했습니다.')}${term('광무 연호','1897년 새 연호로 ‘광무’를 사용하며 황제 즉위와 대한제국 선포를 준비했습니다.')}${term('대한제국','1897년 10월 고종은 황제 즉위식을 거행하고 국호를 ‘대한’으로 바꾸었습니다.')}</div></div>${question('empire-origin','손들기 질문','아관파천 이후 대한제국 수립은 어떤 의미가 더 컸을까요?',[['independence','자주국 선포',{emperor:1,realism:1},'외세 속에서 자주국임을 선포한 선택'],['dependence','외세 의존의 결과',{realism:2},'러시아 의존과 열강 간섭이 만든 불안정한 결과'],['both','둘 다',{complexity:3},'자주국 선포이면서 동시에 외세 의존의 역설'],['unclear','판단 보류',{complexity:1},'자료를 더 보고 판단해야 한다']],'다음: 인물 재조명 →')}</div></section>`},
{html:`<section class="slide"><div class="wrap"><div class="kicker">4단계 · 인물 재조명: 먼저 지도부를 본다</div><h2>한 사람은 하나의 단어로 설명될까?</h2><p class="lead">독립협회를 평가하기 전에, 먼저 그 운동을 이끈 사람들을 봅니다. 지도부의 시선과 한계를 알면 독립협회의 활동도 더 객관적으로 볼 수 있습니다.</p><div class="people"><article class="person"><div><img class="photo" src="assets/images/서재필.jpeg"><span class="tag">서재필</span><h3>계몽가이자 외부자의 시선</h3><p>독립신문과 독립협회를 통해 자주독립과 계몽을 이끌었습니다.</p><p>동시에 미국에서 근대화를 경험한 인물로서 조선을 서구식 기준으로 바라본 한계도 생각해볼 수 있습니다.</p></div><div class="pq">질문: 선진 문물을 배운 사람은 구원자인가, 외부자인가?</div></article><article class="person"><div><img class="photo" src="assets/images/윤치호.webp"><span class="tag">윤치호</span><h3>민권 운동가에서 친일 인사로</h3><p>독립협회와 만민공동회 활동에 참여하며 근대 정치 참여를 주장했습니다.</p><p>그러나 일제강점기에는 친일 행적을 보였다는 점에서 평가가 복잡해집니다.</p></div><div class="pq">질문: 젊은 시절의 이상과 훗날의 선택이 다르면 어떻게 평가할까?</div></article><article class="person"><div><img class="photo" src="assets/images/이완용.jpeg"><span class="tag">이완용</span><h3>독립협회 참여라는 불편한 사실</h3><p>훗날 대표적 매국 인물로 평가되지만, 초기에는 독립협회 활동에 참여한 적이 있습니다.</p><p>그렇다고 이후의 매국 행위가 정당화되는 것은 아닙니다.</p></div><div class="pq">질문: 과거의 좋은 선택이 이후의 잘못을 덮을 수 있을까?</div></article></div>${question('people','손들기 질문 6','한 인물의 초기 개혁 활동과 훗날의 잘못은 어떻게 평가해야 할까요?',[['past','과거도 인정해야 한다',{complexity:1},'과거의 개혁 활동도 인정해야 한다'],['later','이후 행적이 결정적이다',{realism:1},'이후 행적이 더 결정적이다'],['separate','구분해서 평가한다',{complexity:3},'둘을 구분해서 평가해야 한다'],['hard','판단이 어렵다',{complexity:1},'판단이 어렵다']],'다음: 개혁 주체 선택 →')}</div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">5단계 · 발표의 관점 정하기</div><h2>근대화는 누가 이끌어야 했을까?</h2><p class="lead">이 선택은 이후 독립협회와 광무개혁을 보는 시각을 바꿉니다.</p><div class="dark"><h3>오늘의 핵심 대립</h3><ul class="hist"><li><strong>독립협회</strong> — 여론, 집회, 민권, 의회적 개혁</li><li><strong>광무개혁</strong> — 황제권, 국가 주도, 산업·군사·토지 개혁</li><li><strong>황국협회</strong> — 보부상 기반, 독립협회 견제, 정치적 동원</li></ul></div></div>${question('lead','손들기 질문 2','나라가 위기에 빠졌을 때 개혁은 누가 주도해야 성공할까요?',[['citizen','민중과 여론',{citizen:3,complexity:1},'민중과 여론이 주도해야 한다'],['emperor','강한 황제와 국가',{emperor:3,realism:1},'강한 황제와 국가가 주도해야 한다'],['balance','외세와 균형 외교',{realism:3},'외세와의 균형 외교가 우선이다'],['industry','군사·산업 근대화',{emperor:1,realism:2},'군사와 산업을 먼저 키워야 한다']],'다음: 사료로 보기 →')}</div></section>`},
{html:`<section class="slide"><div class="wrap"><div class="kicker">6단계 · 독립협회를 사료로 보기</div><h2>신문, 회보, 상소문: 여론이 정치가 되다</h2><p class="lead">독립협회는 독립문을 세운 단체만이 아니었습니다. 신문과 회보로 여론을 만들고, 토론회와 상소문으로 정치적 요구를 제도화하려 했습니다.</p><div class="flow">${flow('1896 봄','서재필 귀국','갑신정변 망명자가 돌아와 중추원 고문이 됩니다.')}${flow('1896.04.07','독립신문 창간','정부 지원 아래 창간된 한글 중심 신문. 여론이라는 새 무대가 열립니다.')}${flow('1896.07','독립협회 창립','개화 관료와 지식인이 중심. 기금을 내면 가입할 수 있는 구조였습니다.')}${flow('1896.11.30','대조선독립협회회보','독립협회의 공식 목소리. 문명개화와 과학 지식을 소개합니다.')}${flow('1898','상소·만민공동회','의회 설치 요구와 민권 보장이 상소문·집회로 이어집니다.')}</div><div class="cols3" style="margin-top:1rem">${card('대조선독립협회회보','공식 회보가 왜 중요할까?','신문이 대중 여론 형성의 도구였다면, 회보는 독립협회의 생각을 더 조직적으로 보여주는 자료입니다.')} ${card('독립관 토론회','주제 변화가 핵심이다','초기엔 교육·상업 같은 계몽 문제가 많았지만 뒤로 갈수록 토지, 의회 설립, 국정 개혁 문제로 이동합니다.')} ${card('구국 운동 상소문','토론에서 상소로','윤치호 등 독립협회 인물들은 상소를 통해 의회 설치, 언론·집회·출판·결사의 자유, 신체와 재산권 보장을 요구했습니다.')}</div><div class="paper" style="margin-top:1rem"><h3>헌의 6조를 자세히 보기</h3><p>헌의 6조는 독립협회의 밝은 면과 한계를 동시에 보여주는 핵심 사료입니다.</p><div class="cols2"><div><h3>제도 개혁의 요구</h3><ul class="list"><li>외국에 의존하지 않고 관민이 합심할 것</li><li>이권·차관·철도·광산 관련 조약은 대신과 중추원 의장 서명 없이 시행하지 말 것</li><li>전국 재정은 탁지부가 맡고 예산과 결산을 공개할 것</li><li>중대한 범죄는 공판 절차를 거칠 것</li><li>칙임관 임명은 정부 자문과 과반수 찬성을 거칠 것</li></ul></div><div><h3>불편한 첫 조항</h3><p>“외국에 의지하지 말고 관민이 합심하여 황제권을 굳건히 할 것.”</p><p>민권을 요구한 문서의 첫 줄이 황제권 강화라는 점은 중요합니다.</p><div class="quote">질문: 이것은 타협이었을까, 한계였을까, 당시 현실에서 가능한 전략이었을까?</div></div></div><div class="next"><button class="main" onclick="nextSlide()">다음: 독립협회의 빛 →</button></div></div></div></section>`},
{html:`<section class="slide"><div class="wrap"><div class="kicker">7단계 · 독립협회의 밝은 면</div><h2>민권과 자주독립의 가능성</h2><p class="lead" id="leadReflection">개혁 주체 선택이 여기에 반영됩니다.</p><div class="cols4">${card('독립신문','여론 형성','한글 중심 신문으로 민중 계몽과 정치 여론 형성에 기여했습니다.')} ${card('독립문','자주독립의 상징','청 중심 질서에서 벗어나려는 의식의 상징으로 작용했습니다.')} ${card('만민공동회','공개 토론','민중이 정치 문제를 공개적으로 논의한 중요한 장면이었습니다.')} ${card('헌의 6조','의회적 개혁','관민공동회에서 국정 개혁과 의회 설립의 가능성이 제기되었습니다.')}</div><div class="visual"><figure class="figure"><img src="assets/images/독립문.jpg"><figcaption><strong>독립문</strong>자주독립의 상징. 단, 상징 하나만으로 독립협회의 전체 성격을 설명할 수는 없습니다.</figcaption></figure><figure class="figure"><img src="assets/images/독립신문.jpg"><figcaption><strong>독립신문</strong>한글 중심의 신문은 더 많은 사람이 정치와 사회 문제를 접하는 통로가 되었습니다.</figcaption></figure><figure class="figure panorama"><img src="assets/images/만민 공동회.png"><figcaption><strong>만민공동회</strong>민중이 공개적으로 정치 의견을 표현한 장면을 보여주는 핵심 자료입니다.</figcaption></figure></div><div class="paper" style="margin-top:1rem"><h3>여기까지 보면 독립협회는 매우 긍정적으로 보입니다.</h3><p>하지만 오늘 발표의 핵심은 여기서 멈추지 않는 것입니다. 가능성과 함께 한계도 살펴보아야 합니다.</p><div class="next"><button class="main" onclick="nextSlide()">다음: 독립협회 재판 →</button></div></div></div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">8단계 · 독립협회 재조명</div><h2>독립협회는 민주주의 단체였을까?</h2><p class="lead">앞에서 본 지도부의 시선까지 고려하면, 독립협회는 민권을 말했지만 오늘날의 민주주의와 완전히 같았다고 보기는 어렵습니다.</p><div class="paper">${term('민권','민중의 정치 참여 가능성을 열었습니다.')}${term('황권','헌의 6조 1조는 황제권을 굳건히 하자는 표현을 담고 있습니다.')}${term('외세','러시아 견제에는 강했지만 미국·일본 등에 상대적으로 우호적이었습니다.')}${term('지도부','민중을 완전한 정치 주체라기보다 계몽 대상으로 본 한계가 있었습니다.')}</div></div>${question('independence','손들기 질문 3','독립협회는 오늘날의 민주주의 단체였을까요?',[['yes','그렇다',{citizen:2},'그렇다. 민권 운동 단체였다.'],['no','아니다',{realism:1},'아니다. 민주주의라고 보기 어렵다.'],['partial','일부만 그렇다',{complexity:3},'일부만 그렇다. 가능성과 한계가 함께 있다.'],['hold','판단 보류',{complexity:1},'아직 판단하기 어렵다.']],'다음: 국민은 주체였나 →')}</div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">9단계 · 비판적 분석</div><h2>‘국민’은 주체였을까, 수단이었을까?</h2><p class="lead">독립협회가 국민과 함께한 것은 사실이지만, 국민을 동등한 정치 주체로 보았는지는 따져봐야 합니다.</p><div class="arg"><div class="paper"><h3>국민과 함께한 증거</h3><ul class="list"><li>만민공동회에 신분·나이와 무관하게 참여</li><li>종로라는 광장 정치 공간의 형성</li><li>나무꾼, 장사꾼, 하층민의 기부와 연설</li><li>밤새 이어진 철야 시위와 여론 형성</li></ul></div><div class="versus">VS</div><div class="paper"><h3>국민을 앞세운 흔적</h3><ul class="list"><li>‘동포’, ‘국민’, ‘민회’가 정치적 정당성의 언어로 사용됨</li><li>협상 테이블에는 결국 지도부가 앉음</li><li>중추원 민선 의관을 독립협회가 직접 선출하려 함</li><li>국민 전체의 뜻처럼 보이게 하는 전략적 효과</li></ul></div></div></div>${question('people-tool','손들기 질문','독립협회는 국민을 어떻게 보았다고 생각하나요?',[['subject','정치 주체',{citizen:2},'정치의 주체로 보았다'],['tool','정당성의 수단',{realism:2},'정당성을 얻기 위한 수단으로 보았다'],['both','둘 다',{complexity:3},'함께했지만, 완전히 동등한 주체는 아니었다'],['open','판단 보류',{complexity:1},'자료를 더 보고 판단해야 한다']],'다음: 중추원과 의회 설립 →')}</div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">10단계 · 중추원과 의회 설립 운동</div><h2>중추원은 의회가 될 수 있었을까?</h2><p class="lead">독립협회는 중추원을 입법·조약 비준·정책 심사 기능을 가진 의회적 기구로 바꾸려 했습니다.</p><div class="paper">${term('중추원','본래 자문기관적 성격이 강했지만, 독립협회는 이를 의회적 기관으로 개편하려 했습니다.')}${term('중추원 관제','1898년 새 관제는 입법권·조약 비준권·정책 심사권과 건의권을 가진 의회적 기능을 담았습니다.')}${term('민선 의관','독립협회는 중추원 민선 25명을 자신들이 선출하려 했습니다.')}${term('좌절','관제 재개정과 의관 구성의 변화 속에서 의회화 가능성은 약해졌습니다.')}</div></div><div><div class="dark"><h3>중추원 의관 50명 구성의 의미</h3><ul class="list"><li>독립협회·만민공동회 계열: 17명</li><li>황국협회 계열: 16명</li><li>황제파 계열: 17명</li></ul><p>겉으로는 관제를 실시하는 듯했지만, 실제로는 황제파와 황국협회 계열이 우세한 구조였습니다.</p></div>${question('jungchuwon','손들기 질문','중추원 개편은 어느 쪽에 더 가까웠을까요?',[['assembly','의회 정치의 시작',{citizen:2},'의회 정치의 시작'],['control','황제권의 통제 장치',{emperor:2},'황제권의 통제 장치'],['both','가능성과 좌절이 함께 있음',{complexity:3},'가능성과 좌절이 함께 있었다'],['unclear','판단 보류',{complexity:1},'자료를 더 봐야 한다']],'다음: 황국협회 보기 →')}</div></div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">11단계 · 반대편 살펴보기</div><h2>황국협회는 단순한 악역이었을까?</h2><p class="lead">황국협회는 독립협회와 충돌했고 만민공동회 탄압에 동원되었습니다. 하지만 보부상이라는 민중 기반도 있었습니다.</p><div class="dark"><h3>핵심 질문</h3><p>만민공동회도 민중, 황국협회도 민중 기반이 있었습니다. 그렇다면 “민중”은 항상 같은 정치적 방향을 가질까요?</p></div><figure class="figure" style="margin-top:1rem"><img src="assets/images/황국협회.jpeg"><figcaption><strong>황국협회</strong>독립협회와 충돌한 보부상 기반 조직. “또 다른 민중”이라는 관점에서 재조명합니다.</figcaption></figure></div>${question('hwangguk','손들기 질문 4','황국협회를 어떻게 봐야 할까요?',[['villain','폭력적 어용단체',{citizen:1},'독립협회를 탄압한 폭력적 어용단체'],['used','정치적으로 이용된 조직',{complexity:2},'보부상 권익 조직이 정치적으로 이용된 사례'],['both','둘 다',{complexity:3},'둘 다이다. 비판과 맥락을 함께 봐야 한다.'],['unknown','자료가 더 필요하다',{complexity:1},'자료가 더 필요하다.']],'다음: 외세와 이권 →')}</div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">12단계 · 외세와 이권</div><h2>러시아만 막고, 일본은 놓쳤는가?</h2><p class="lead">독립협회는 러시아의 절영도 조차 요구와 이권 침탈에는 강하게 반대했습니다. 하지만 미국·일본 등 다른 열강에 대해서는 상대적으로 우호적이었습니다.</p><div class="flow">${flow('러시아','막힘','절영도 조차 요구, 군사·재정 고문 문제 등에서 강한 반대 운동.')}${flow('조선','갈등','고종과 독립협회가 권력을 어떻게 나눌지 충돌.')}${flow('미국·영국','상대적 우호','서구 문명과 제도 수용의 모델로 인식되는 경우가 많음.')}${flow('일본','위험 과소평가','일본의 침략 의도를 충분히 간파하지 못했다는 비판.')}${flow('결과','개혁 좌절','내부 권력투쟁 속에서 외세는 계속 이권을 노림.')}</div><div class="quote">윤치호는 독립협회 해산 직후 일기에서 러시아와 일본 양쪽이 조선 정치에 개입하고 있다고 보았습니다. 문제는 그 깨달음이 너무 늦었다는 점입니다.</div></div>${question('foreign','손들기 질문','독립협회의 외세 인식 한계는 무엇에서 비롯되었을까요?',[['pro-west','서구 문명 동경',{realism:1},'서구 문명과 근대화에 대한 기대'],['anti-russia','반러 중심 사고',{realism:2},'러시아 견제에 지나치게 집중'],['elite','지도부의 시야 한계',{complexity:2},'개화 지식인 지도부의 시야 한계'],['all','복합적 원인',{complexity:3},'위 요소들이 모두 겹쳤다']],'다음: 광무개혁 재조명 →')}</div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">13단계 · 광무개혁 재조명</div><h2>광무개혁은 근대화였을까, 황제권 강화였을까?</h2><p class="lead">광무개혁은 양전·지계, 도시 근대화, 산업·군사 개혁을 추진했지만, 정치적으로는 황제권 강화의 성격도 강했습니다.</p><div class="cols2"><div class="dark"><span class="tag">성과</span><h3>국가 주도 근대화</h3><p>토지 조사, 전기·전차·통신, 상공업 진흥, 군제 개편 등.</p></div><div class="dark"><span class="tag">한계</span><h3>황제권 중심</h3><p>민중 참여 기반이 약했고, 재정 운영과 외세 압박의 한계가 컸습니다.</p></div></div><div class="visual"><figure class="figure portrait"><img src="assets/images/고종.webp"><figcaption><strong>황제 중심 국가</strong>광무개혁은 근대화 시도이면서 동시에 황제권 강화와 연결됩니다.</figcaption></figure><figure class="figure"><img src="assets/images/광무개혁 열차.jpeg"><figcaption><strong>도시 근대화</strong>전차·전기·통신 같은 변화는 광무개혁의 근대화 측면을 보여줍니다.</figcaption></figure></div></div>${question('gwangmu','손들기 질문 5','광무개혁의 성격은 무엇에 더 가까울까요?',[['modernization','근대화',{emperor:1,realism:1},'근대화 정책에 가깝다'],['power','황제권 강화',{citizen:1},'황제권 강화에 가깝다'],['both','둘 다',{complexity:3},'둘 다이다'],['failed','실패한 개혁',{realism:1},'결국 실패한 개혁이다']],'다음: 광무개혁 세부 내용 →')}</div></section>`},
{html:`<section class="slide"><div class="wrap"><div class="kicker">14단계 · 광무개혁 세부 내용</div><h2>구본신참: 옛 질서 위에 새 문물을 얹다</h2><p class="lead">광무개혁은 ‘구본신참’을 내세웠습니다. 옛 제도를 완전히 무너뜨리기보다, 황제권과 기존 질서를 바탕으로 근대 제도와 기술을 받아들이려 한 것입니다.</p><div class="cols3">${card('정치·법','대한국 국제','자주 독립국임을 밝히는 동시에 황제가 입법·행정·군사·외교권을 장악하는 전제 황권을 명문화했습니다.')} ${card('군사','원수부 설치와 군제 개혁','황제가 대원수로서 군권을 직접 장악했습니다. 친위대·시위대 강화, 무관학교, 근대식 군사 훈련도 추진되었습니다.')} ${card('토지','양전 사업과 지계 발급','양지아문을 설치해 토지를 조사하고 지계아문을 통해 토지 소유권 증명서인 지계를 발급하려 했습니다.')} ${card('경제','식산흥업과 황실 재정','상공업 진흥, 공장과 회사 설립, 광산 개발, 해운·철도·금융·화폐 제도 정비가 추진되었습니다.')} ${card('문물 수용','전차·전기·전화·철도·도로','한성에는 전차와 전등이 등장했고, 전신·전화, 도로 정비, 근대 학교와 실업 교육도 확대되었습니다.')} ${card('세계 무대','파리 만국박람회','1900년 파리 만국박람회 참가는 대한제국이 세계 속 독립국가로 자신을 보여주려 한 장면입니다.')}</div><div class="paper" style="margin-top:1rem"><h3>한청 통상 조약: 청과 대등한 관계를 문서로 만들다</h3><div class="cols2"><div><p>1899년 한청 통상 조약은 대한제국과 청이 대등한 국가 사이에서 맺은 조약이라는 점에서 상징성이 큽니다.</p><p>조선이 사대 관계에서 벗어나 근대 국제법적 관계 속의 주권국가로 인정받으려 한 시도였습니다.</p></div><div><p>하지만 대등한 조약 하나가 곧 완전한 독립을 보장하지는 않았습니다. 러시아와 일본의 압박, 재정 부족, 군사력의 한계는 여전히 남아 있었습니다.</p><div class="quote">질문: 대한제국은 ‘독립국가처럼 보이려’ 했던 것일까, 실제로 독립국가의 힘을 갖추려 했던 것일까?</div></div></div><div class="route"><strong>해석 포인트</strong>광무개혁은 “낡은 전제 왕권”과 “근대 국가 건설” 중 하나만이 아니라, 두 성격이 섞인 개혁이었습니다.</div><div class="next"><button class="main" onclick="nextSlide()">다음: 상소문 비교 →</button></div></div></div></section>`},
{html:`<section class="slide"><div class="wrap"><div class="kicker">15단계 · 같은 사건, 다른 상소문</div><h2>윤치호의 상소와 이문화의 상소</h2><p class="lead">독립협회 문제를 두고 같은 시대 사람들은 완전히 다른 언어로 현실을 해석했습니다.</p><div class="cols2"><article class="paper"><span class="tag">윤치호·독립협회 쪽 시각</span><h3>의회 설치와 법치 요구</h3><p>의회 설치와 법령 시행을 요구하며, 정치 개혁과 민권 보장을 주장했습니다.</p><ul class="list"><li>국민의 신체·재산권 보장</li><li>언론·집회·출판·결사의 자유</li><li>의회 설치와 법령 시행 요구</li><li>보수파 대신 파면과 개혁 정부 요구</li></ul></article><article class="paper"><span class="tag">이문화 등 보수 유생 쪽 시각</span><h3>전제 황권과 질서 수호</h3><p>독립협회가 구미식 공화 정치를 전제 정치에 옮기려 하고, 국정을 어지럽힌다고 비판했습니다.</p><ul class="list"><li>상벌권은 임금의 권한이라는 주장</li><li>공화 정치와 민회 활동에 대한 경계</li><li>만민공동회를 임금 협박으로 해석</li><li>남녀노소가 함께 국정을 논하는 것을 질서 붕괴로 봄</li></ul></article></div>${question('petitions','손들기 질문','두 상소문을 비교하면, 갈등의 본질은 무엇에 가까웠을까요?',[['freedom','민권과 자유의 문제',{citizen:2},'민권과 자유를 둘러싼 갈등'],['order','황권과 질서의 문제',{emperor:2},'황권과 사회 질서를 둘러싼 갈등'],['worldview','세계관의 충돌',{complexity:3},'근대적 정치관과 전통적 질서관의 충돌'],['power','권력 다툼',{realism:2},'정치 세력 간 권력 다툼']],'다음: 근거 자료 정리 →')}</div></section>`},
{html:`<section class="slide"><div class="wrap"><div class="kicker">16단계 · 사료와 논문으로 정리</div><h2>오늘 발표의 근거 자료</h2><p class="lead">발표 마지막 전, 우리가 어떤 근거로 판단했는지 보여주는 슬라이드입니다.</p><div class="cols3">${card('교과서','한국사 122–127쪽','독립협회, 대한제국, 광무개혁의 기본 흐름을 잡는 기준 자료입니다.')} ${card('교과서 124쪽 질문','외세 인식의 한계','독립협회가 주로 러시아를 견제하고 미국·일본 등에 우호적이었다는 한계를 발표 질문으로 확장했습니다.')} ${card('조계원 2016','국왕과 독립협회의 갈등','만민·관민공동회를 둘러싼 고종과 독립협회의 갈등, 국민 개념의 사용, 중추원 문제를 분석하는 데 사용합니다.')} ${card('주진오 2009','서재필의 역사 인식','서재필의 개화 활동과 서구/일본 인식, 외부자의 시선을 비판적으로 보는 데 활용합니다.')} ${card('최형익 2004','근대 민주주의의 기원','독립신문, 독립협회, 만민공동회를 근대 민주주의의 기원으로 볼 수 있는 근거를 제공합니다.')} ${card('친일반민족행위 자료','윤치호·이완용의 후대 행적','초기 개혁 활동과 이후 친일 행적을 구분해 평가해야 한다는 인물 재조명 파트의 근거입니다.')}</div><div class="paper" style="margin-top:1rem"><h3>발표자가 강조할 문장</h3><p>“우리는 독립협회를 깎아내리려는 것이 아니라, 더 정확히 보려는 것입니다. 만민공동회는 진짜였고 헌의 6조도 진짜였습니다. 그러나 국민을 위한 것과 국민과 함께한 것은 다릅니다.”</p><div class="next"><button class="main" onclick="nextSlide()">다음: 학급 선택 정리 →</button></div></div></div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">17단계 · 지금까지의 선택</div><h2>우리 반의 역사 판단 흐름</h2><p class="lead">지금까지 발표자가 누른 답을 바탕으로, 우리 반이 어떤 관점에 가까웠는지 확인합니다.</p><div class="dark"><h3>선택 기록</h3><ul class="hist" id="routeHistory"><li>아직 기록된 선택이 없습니다.</li></ul></div></div><div class="paper"><h3>관점 게이지</h3><p>높은 점수가 “정답”이라는 뜻은 아닙니다. 우리 반이 어떤 방향으로 사고했는지 보여주는 장치입니다.</p><div class="meter"><div class="meter-row"><span>민권·여론</span><div class="track"><div class="fill" id="meter-citizen"></div></div><strong id="score-citizen">0</strong></div><div class="meter-row"><span>황권·국가</span><div class="track"><div class="fill" id="meter-emperor"></div></div><strong id="score-emperor">0</strong></div><div class="meter-row"><span>현실·생존</span><div class="track"><div class="fill" id="meter-realism"></div></div><strong id="score-realism">0</strong></div><div class="meter-row"><span>복합 판단</span><div class="track"><div class="fill" id="meter-complexity"></div></div><strong id="score-complexity">0</strong></div></div><div class="route" id="routeInterpretation">아직 선택이 충분하지 않습니다.</div><div class="next"><button class="main" onclick="nextSlide()">다음: 마지막 판결 →</button></div></div></div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">18단계 · 마지막 판단</div><h2>그래서, 이 시대의 개혁을 어떻게 볼까?</h2><p class="lead">마지막 질문은 발표의 결론을 학생들이 직접 만들어보는 장면입니다.</p><div class="dark" id="finalLeadNote">지금까지의 선택을 바탕으로 마지막 질문을 던집니다.</div></div>${question('final','마지막 손들기 질문','독립협회와 광무개혁을 보고, 이 시대를 가장 잘 설명하는 문장은 무엇일까요?',[['citizen','민권 중심 개혁의 가능성',{citizen:2},'민권 중심 개혁의 가능성이 열린 시대'],['state','국가 주도 근대화의 시도',{emperor:2},'국가 주도 근대화가 시도된 시대'],['failure','내부 한계와 외세로 좌절된 시대',{realism:2},'내부 한계와 외세로 좌절된 시대'],['complex','불완전한 선택들이 충돌한 시대',{complexity:3},'불완전한 선택들이 충돌한 시대']],'결론 보기 →')}</div></section>`},
{html:`<section class="slide"><div class="wrap grid"><div><div class="kicker">결론</div><h2>역사는 판결문이 아니라 질문지에 가깝다.</h2><p class="lead" id="closingLead">우리 반의 선택을 바탕으로 결론을 정리합니다.</p><div class="quote-feature"><div class="qlabel">마지막 문장</div><p class="qmain"><span>역사는</span><strong>쉽게 판단하지 않기 위해</strong><span>배운다.</span></p></div></div><div class="paper"><h3>발표 결론</h3><p>독립협회는 완전히 선한 단체도, 완전히 실패한 단체도 아니었습니다. 광무개혁도 단순한 근대화 정책이나 단순한 황제권 강화만으로 설명할 수 없습니다. 황국협회와 인물들의 행적까지 보면, 이 시기의 역사는 애국과 매국, 진보와 보수만으로 나누기 어렵습니다.</p><div class="route" id="closingRoute"></div><div class="next"><button class="sub" onclick="goTo(0)">처음으로</button><button class="sub" onclick="resetPresentation()">선택 초기화</button></div></div></div></section>`}];
function question(q,title,desc,opts,nextText){return `<div class="choice-panel" data-question="${q}"><h3>${title}</h3><p class="desc">${desc}</p><div class="choices">${opts.map((o,i)=>`<button class="choice" onclick='choose("${q}","${o[0]}","${o[1]}",${JSON.stringify(o[2])})'><span class="num">${i+1}</span><span>${o[3]}</span></button>`).join('')}</div><div class="feedback" id="feedback-${q}"></div><div class="next"><button class="main" onclick="nextSlide()">${nextText}</button></div></div>`}
function time(y,t,d){return `<div class="time"><div class="year">${y}</div><div><strong>${t}</strong><span>${d}</span></div></div>`}function term(a,b){return `<div class="term"><strong>${a}</strong><span>${b}</span></div>`}function card(tag,h,p){return `<article class="card"><span class="tag">${tag}</span><h3>${h}</h3><p>${p}</p></article>`}function flow(a,b,c){return `<div class="flow-step"><small>${a}</small><strong>${b}</strong>${c}</div>`}
function render(){app.innerHTML=slides.map(s=>s.html).join('');goTo(current,false)}
function choose(q,opt,label,inc){if(state.increments[q])Object.entries(state.increments[q]).forEach(([k,v])=>state.scores[k]=Math.max(0,(state.scores[k]||0)-v));state.answers[q]=opt;state.labels[q]=label;state.increments[q]=inc||{};Object.entries(inc||{}).forEach(([k,v])=>state.scores[k]=(state.scores[k]||0)+v);const panel=document.querySelector(`[data-question="${q}"]`);if(panel){panel.querySelectorAll('.choice').forEach(b=>{b.classList.remove('selected');const code=b.getAttribute('onclick')||'';if(code.includes(`"${q}"`)&&code.includes(`"${opt}"`))b.classList.add('selected')})}const fb=document.getElementById('feedback-'+q);if(fb&&F[q]&&F[q][opt]){
  fb.classList.remove('visible');
  void fb.offsetWidth;
  fb.innerHTML='<strong>'+F[q][opt][0]+'</strong>'+F[q][opt][1]+'<div class="verdict-stamp"><span>판결</span><small>'+label+'</small></div>';
  fb.classList.add('visible');
}
updateStatus();dynamic()}
function goTo(i,scroll=true){
  current=Math.max(0,Math.min(i,slides.length-1));
  document.querySelectorAll('.slide').forEach((s,n)=>s.classList.toggle('active',n===current));
  updateStatus();
  dynamic();
  if(scroll)window.scrollTo({top:0,behavior:'smooth'});
}
function slideTitle(i){
  const raw=(slides[i]&&slides[i].html)||'';
  const h2=raw.match(/<h2>(.*?)<\/h2>/);
  const h1=raw.match(/<h1>([\s\S]*?)<\/h1>/);
  const txt=(h2&&h2[1])||(h1&&h1[1])||'다음 장면';
  return txt.replace(/<br\s*\/?> /g,' ').replace(/<br\s*\/?>(?!\s)/g,' ').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
}
let moving=false;
function linkedGo(target,label){
  target=Math.max(0,Math.min(target,slides.length-1));
  if(target===current||moving){return;}
  moving=true;
  const bridge=document.getElementById('routeBridge');
  if(!bridge){
    goTo(target);
    moving=false;
    return;
  }
  bridge.innerHTML='<span>'+label+'</span><strong>'+slideTitle(target)+'</strong>';
  bridge.classList.remove('active');
  void bridge.offsetWidth;
  bridge.classList.add('active');
  setTimeout(function(){goTo(target);},720);
  setTimeout(function(){bridge.classList.remove('active');moving=false;},1750);
}
function nextSlide(){linkedGo(current+1,'다음 쟁점')}
function prevSlide(){linkedGo(current-1,'이전 쟁점')}
function startTimeTravel(){
  const w=document.getElementById('timewarp');
  w.classList.remove('active');
  void w.offsetWidth;
  w.classList.add('active');
  setTimeout(()=>goTo(current+1),2750);
  setTimeout(()=>w.classList.remove('active'),3350);
}function resetPresentation(){
  state={answers:{},labels:{},scores:{citizen:0,emperor:0,realism:0,complexity:0},increments:{}};
  current=0;
  render();
  const flash=document.getElementById('resetFlash');
  if(flash){
    flash.classList.remove('active');
    void flash.offsetWidth;
    flash.classList.add('active');
  }
  window.scrollTo({top:0,behavior:'smooth'});
}
function topLens(){const e=Object.entries(state.scores).sort((a,b)=>b[1]-a[1]);return e[0][1]>0?e[0]:['none',0]}function lensName(k){return {citizen:'민권·여론 중심',emperor:'황권·국가 중심',realism:'현실·생존 중심',complexity:'복합 판단 중심',none:'아직 형성 중'}[k]||'아직 형성 중'}function updateStatus(){const top=topLens()[0];document.getElementById('slideStatus').textContent=(current+1)+' / '+slides.length;document.getElementById('lensStatus').textContent='학급 관점: '+lensName(top);document.getElementById('choiceCount').textContent='선택 기록 '+Object.keys(state.answers).length+'개';document.getElementById('progress').style.width=(current/Math.max(1,slides.length-1)*100)+'%'}
function dynamic(){const w=document.getElementById('whyReflection');if(w)w.innerHTML=state.labels.why?`<h3>첫 선택 반영</h3><p>우리 반은 역사를 배우는 이유로 <strong>“${state.labels.why}”</strong>를 선택했습니다.</p>`:'<h3>첫 선택 반영</h3><p>이전 화면에서 선택하면 여기에 반영됩니다.</p>';const l=document.getElementById('leadReflection');if(l){const m={citizen:'민중과 여론을 선택했다면, 만민공동회와 헌의 6조가 특히 중요해집니다. 그러나 민중 참여에도 한계와 충돌이 있었습니다.',emperor:'강한 황제와 국가를 선택했다면, 광무개혁의 국가 주도 근대화가 설득력 있게 보입니다. 그러나 권력 집중의 위험도 함께 보아야 합니다.',balance:'균형 외교를 선택했다면, 외세 압박 속에서 선택지가 제한되었다는 점을 중심으로 볼 수 있습니다.',industry:'군사·산업 근대화를 선택했다면, 광무개혁의 실력 양성 시도가 중요해집니다. 다만 정치 개혁 없는 근대화가 충분했는지도 질문해야 합니다.'};l.textContent=m[state.answers.lead]||'앞선 선택에 따라 독립협회와 광무개혁의 의미가 다르게 보입니다.'}history();meters();finalNotes()}
function history(){const list=document.getElementById('routeHistory');if(!list)return;const names={why:'역사를 배우는 이유','empire-origin':'아관파천과 대한제국',lead:'개혁 주체',independence:'독립협회 평가','people-tool':'국민 인식 평가',jungchuwon:'중추원 평가',hwangguk:'황국협회 평가',foreign:'외세 인식 평가',gwangmu:'광무개혁 평가',petitions:'상소문 비교',people:'인물 평가',final:'최종 시대 해석'};const order=Object.keys(names).filter(k=>state.labels[k]);list.innerHTML=order.length?order.map(k=>`<li><strong>${names[k]}</strong>: ${state.labels[k]}</li>`).join(''):'<li>아직 기록된 선택이 없습니다.</li>'}
function meters(){const max=Math.max(1,...Object.values(state.scores));['citizen','emperor','realism','complexity'].forEach(k=>{const sc=state.scores[k]||0;let s=document.getElementById('score-'+k),m=document.getElementById('meter-'+k);if(s)s.textContent=sc;if(m)m.style.width=Math.min(100,sc/max*100)+'%'});const r=document.getElementById('routeInterpretation');if(r){const t=topLens()[0];const txt={citizen:'<strong>현재 흐름: 민권·여론 중심</strong>독립협회의 가능성과 민중 참여의 의미를 중요하게 보고 있습니다.',emperor:'<strong>현재 흐름: 황권·국가 중심</strong>국가 주도 개혁과 강한 통치력을 중요하게 보고 있습니다.',realism:'<strong>현재 흐름: 현실·생존 중심</strong>외세 압박과 생존 조건, 실패의 원인을 중요하게 보고 있습니다.',complexity:'<strong>현재 흐름: 복합 판단 중심</strong>한쪽을 정답으로 고르기보다 가능성과 한계를 함께 보고 있습니다.',none:'<strong>아직 선택이 충분하지 않습니다.</strong>질문에 답하면 관점 흐름이 표시됩니다.'};r.innerHTML=txt[t]}}
function finalNotes(){const top=topLens()[0];const f=document.getElementById('finalLeadNote');if(f){const txt={citizen:'<h3>현재 우리 반은 민권과 여론에 주목하고 있습니다.</h3><p>마지막 질문에서는 독립협회의 가능성과 한계를 함께 판단해봅니다.</p>',emperor:'<h3>현재 우리 반은 국가 주도 개혁에 주목하고 있습니다.</h3><p>광무개혁의 성과와 황제권 강화 문제를 함께 판단해봅니다.</p>',realism:'<h3>현재 우리 반은 현실 조건과 생존 문제에 주목하고 있습니다.</h3><p>내부 한계와 외세 압박이 개혁을 어떻게 좌절시켰는지 봅니다.</p>',complexity:'<h3>현재 우리 반은 복합적 판단에 가까워지고 있습니다.</h3><p>이 시대를 여러 선택의 충돌로 설명할 수 있는지 생각해봅니다.</p>',none:'<h3>아직 뚜렷한 흐름이 없습니다.</h3><p>앞선 선택을 입력하면 안내 문구가 바뀝니다.</p>'};f.innerHTML=txt[top]}const cl=document.getElementById('closingLead'),cr=document.getElementById('closingRoute');if(cl&&cr){cl.textContent='우리 반의 선택 흐름은 “'+lensName(top)+'”에 가장 가까웠습니다.';const chosen=state.labels.final?'마지막으로 우리 반은 “'+state.labels.final+'”를 선택했습니다.':'마지막 선택은 아직 기록되지 않았습니다.';cr.innerHTML='<strong>'+chosen+'</strong> 하지만 이 발표의 결론은 특정 선택 하나가 정답이라는 뜻이 아닙니다. 독립협회, 광무개혁, 황국협회, 그리고 여러 인물의 행적을 함께 보면 역사는 선악의 표가 아니라 판단을 훈련하는 질문지가 됩니다.'}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextSlide();if(e.key==='ArrowLeft')prevSlide()});render();
</script>
