<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>역사는 흑백이 아니다 | 독립협회와 광무개혁</title>
<style>
  :root{--bg:#100e0b;--paper:#f5ead2;--gold:#c99a3a;--line:rgba(245,234,210,.18)}
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;min-height:100%;background:var(--bg);color:var(--paper);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .loader{position:fixed;inset:0;z-index:99999;display:grid;place-items:center;padding:1rem;background:radial-gradient(circle at 20% 0%,rgba(201,154,58,.22),transparent 28rem),var(--bg);color:var(--paper)}
  .box{width:min(92vw,560px);padding:1.2rem 1.4rem;border:1px solid var(--line);border-radius:1.2rem;background:rgba(16,14,11,.72);box-shadow:0 24px 70px rgba(0,0,0,.35)}
  .box strong{display:block;font-size:1.25rem;margin-bottom:.35rem}
  .box p{margin:.25rem 0;color:rgba(245,234,210,.72);line-height:1.6}
  .box code{color:#f1c76e}
  .actions{margin-top:.8rem;display:none;gap:.5rem;flex-wrap:wrap}
  .actions.is-visible{display:flex}
  .actions a,.actions button{border:1px solid rgba(245,234,210,.22);background:rgba(245,234,210,.08);color:#f5ead2;border-radius:999px;padding:.45rem .7rem;font:inherit;text-decoration:none;cursor:pointer}
</style>
</head>
<body>
<div class="loader" id="loader">
  <div class="box">
    <strong>발표 자료를 iframe 없이 여는 중...</strong>
    <p>기본 발표 구조를 현재 문서에 펼치고, 추가 JS는 내용 보강과 효과 레이어로만 연결합니다.</p>
    <p id="loadMessage">원본 발표 자료 가져오는 중</p>
    <div class="actions" id="fallbackActions">
      <button type="button" onclick="location.reload()">다시 시도</button>
      <a href="https://github.com/simsy0924/KoreanHistoryPrensentation">GitHub 저장소 열기</a>
    </div>
  </div>
</div>
<script>
(function(){
  'use strict';

  const VERSION = '20260529-clean-index-v1';
  const ORIGINAL_INDEX_URL = 'https://raw.githubusercontent.com/simsy0924/KoreanHistoryPrensentation/22a5820d6640df3ba65c580c65154be8989caa48/index.html?raw=' + VERSION;

  // TODO: 다음 정리 단계에서 contentScripts의 결과를 index.html 본문으로 흡수하면,
  // 이 배열은 삭제하고 effectScripts만 유지한다.
  const contentScripts = [
    './data/yunchiho-diary-entries.js',
    './data/yunchiho-diary-section.js',
    './data/yunchiho-diary-tone-revision.js',
    './data/presentation-revision-notes.js',
    './data/source-slide-content-revision.js',
    './data/hwangguk-association-slide-revision.js'
  ];

  const effectScripts = [
    './data/page-jump-navigation.js',
    './data/presentation-effects-revision.js',
    './data/presentation-enhancements.js'
  ];

  const message = document.getElementById('loadMessage');
  const fallback = document.getElementById('fallbackActions');

  function setMessage(text){
    if(message) message.textContent = text;
  }

  function showError(error){
    console.error(error);
    setMessage('복원 실패: ' + error.message);
    if(fallback) fallback.classList.add('is-visible');
  }

  function addBaseTag(html){
    if(html.includes('<base ')) return html;
    return html.replace(/<head(.*?)>/i, '<head$1><base href="./">');
  }

  function scriptTag(src){
    const joiner = src.includes('?') ? '&' : '?';
    return '<script src="' + src + joiner + 'v=' + VERSION + '"><\/script>';
  }

  function attachScripts(html){
    const tags = [
      '<!-- content patches: 발표 본문 보강. 추후 index.html 본문으로 흡수 예정 -->',
      ...contentScripts.map(scriptTag),
      '<!-- effects: 애니메이션, 이동, 보조 UI -->',
      ...effectScripts.map(scriptTag)
    ].join('\n');

    if(html.includes('</body>')) return html.replace('</body>', tags + '\n</body>');
    return html + tags;
  }

  async function boot(){
    try{
      const response = await fetch(ORIGINAL_INDEX_URL, {cache:'no-store'});
      if(!response.ok) throw new Error('원본 index.html을 가져오지 못했습니다: ' + response.status);

      setMessage('발표 구조와 보조 효과 적용 중');
      let html = await response.text();
      html = addBaseTag(html);
      html = attachScripts(html);

      document.open();
      document.write(html);
      document.close();
    }catch(error){
      showError(error);
    }
  }

  boot();
})();
</script>
</body>
</html>
