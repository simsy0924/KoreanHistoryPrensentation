<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>역사는 흑백이 아니다 | 독립협회와 광무개혁</title>
<style>
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#100e0b;color:#f5ead2;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  iframe{width:100%;height:100%;border:0;display:block;background:#100e0b}
  .loader{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:radial-gradient(circle at 20% 0%,rgba(201,154,58,.22),transparent 28rem),#100e0b;color:#f5ead2;transition:.35s}
  .loader.hidden{opacity:0;pointer-events:none}
  .box{width:min(92vw,520px);padding:1.2rem 1.4rem;border:1px solid rgba(245,234,210,.18);border-radius:1.2rem;background:rgba(16,14,11,.72);box-shadow:0 24px 70px rgba(0,0,0,.35)}
  .box strong{display:block;font-size:1.25rem;margin-bottom:.35rem}
  .box p{margin:.25rem 0;color:rgba(245,234,210,.72);line-height:1.6}
  .box code{color:#f1c76e}
  .actions{margin-top:.8rem;display:flex;gap:.5rem;flex-wrap:wrap}
  .actions a,.actions button{border:1px solid rgba(245,234,210,.22);background:rgba(245,234,210,.08);color:#f5ead2;border-radius:999px;padding:.45rem .7rem;font:inherit;text-decoration:none;cursor:pointer}
</style>
</head>
<body>
<div class="loader" id="loader">
  <div class="box">
    <strong>윤치호 일기 강화판을 불러오는 중...</strong>
    <p>기존 발표 사이트에 윤치호 일기 사료와 필기 수정안을 함께 연결하고 있습니다.</p>
    <p id="loadMessage">원본 발표 자료 로딩 중</p>
    <div class="actions" id="fallbackActions" style="display:none">
      <button onclick="location.reload()">다시 시도</button>
      <a href="./index-yunchiho.html?v=20260526-note-revision">예비 연결판 열기</a>
    </div>
  </div>
</div>
<iframe id="presentationFrame" title="역사는 흑백이 아니다 발표 사이트"></iframe>
<script>
(function(){
  const VERSION='20260526-note-revision';
  const ORIGINAL_INDEX_URL='https://raw.githubusercontent.com/simsy0924/KoreanHistoryPrensentation/22a5820d6640df3ba65c580c65154be8989caa48/index.html?raw='+VERSION;
  const frame=document.getElementById('presentationFrame');
  const loader=document.getElementById('loader');
  const msg=document.getElementById('loadMessage');
  const fallback=document.getElementById('fallbackActions');

  function setMessage(text){ if(msg) msg.textContent=text; }

  function injectScript(doc, src){
    return new Promise((resolve,reject)=>{
      const s=doc.createElement('script');
      s.src=src+(src.includes('?')?'&':'?')+'v='+VERSION+'&t='+Date.now();
      s.onload=resolve;
      s.onerror=()=>reject(new Error(src+' 로드 실패'));
      doc.body.appendChild(s);
    });
  }

  function prepareHtml(html){
    let prepared=html;
    if(!prepared.includes('<base ')){
      prepared=prepared.replace('<head>','<head><base href="./">');
    }
    return prepared;
  }

  async function boot(){
    try{
      setMessage('원본 발표 자료 가져오는 중');
      const response=await fetch(ORIGINAL_INDEX_URL,{cache:'no-store'});
      if(!response.ok) throw new Error('원본 index.html을 가져오지 못했습니다: '+response.status);
      const html=prepareHtml(await response.text());

      const ready=new Promise((resolve)=>{
        frame.addEventListener('load',resolve,{once:true});
      });
      frame.srcdoc=html;
      await ready;

      const doc=frame.contentDocument || frame.contentWindow.document;
      setMessage('윤치호 일기 데이터 연결 중');
      await injectScript(doc,'./data/yunchiho-diary-entries.js');
      await injectScript(doc,'./data/yunchiho-diary-section.js');
      setMessage('필기 수정안 반영 중');
      await injectScript(doc,'./data/presentation-revision-notes.js');
      setMessage('연결 완료');
      setTimeout(()=>loader.classList.add('hidden'),650);
    }catch(error){
      console.error(error);
      setMessage('통합 로딩 실패: '+error.message);
      fallback.style.display='flex';
    }
  }

  boot();
})();
</script>
</body>
</html>
