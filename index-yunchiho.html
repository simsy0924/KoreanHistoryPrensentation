<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>역사는 흑백이 아니다 | 윤치호 일기 연결판</title>
<style>
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#100e0b}
  iframe{width:100%;height:100%;border:0;display:block;background:#100e0b}
  .fallback{position:fixed;left:50%;bottom:1rem;transform:translateX(-50%);z-index:10;padding:.55rem .8rem;border-radius:999px;background:rgba(16,14,11,.8);color:#f5ead2;font-family:system-ui,sans-serif;font-size:.85rem;border:1px solid rgba(245,234,210,.2)}
</style>
</head>
<body>
<iframe id="presentationFrame" src="./index.html" title="독립협회 발표 사이트"></iframe>
<div class="fallback" id="status">윤치호 일기 섹션을 연결하는 중...</div>
<script>
(function(){
  const frame=document.getElementById('presentationFrame');
  const status=document.getElementById('status');
  function injectScript(doc, src){
    return new Promise((resolve,reject)=>{
      const s=doc.createElement('script');
      s.src=src;
      s.onload=resolve;
      s.onerror=reject;
      doc.body.appendChild(s);
    });
  }
  frame.addEventListener('load', async ()=>{
    try{
      const doc=frame.contentDocument || frame.contentWindow.document;
      await injectScript(doc,'./data/yunchiho-diary-entries.js');
      await injectScript(doc,'./data/yunchiho-diary-section.js');
      status.textContent='윤치호 일기 섹션 연결 완료';
      setTimeout(()=>{status.style.display='none'},1600);
    }catch(err){
      status.textContent='연결 실패: 같은 출처에서 열어야 합니다';
      console.error(err);
    }
  });
})();
</script>
</body>
</html>
